<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Examen IA - Citlally</title>
    <style>
        body { text-align: center; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #eef2f3; color: #333; }
        canvas { background-color: #fff; border: 4px solid #2c3e50; border-radius: 8px; display: block; margin: 20px auto; box-shadow: 0 4px 15px rgba(0,0,0,0.2); }
        h1 { color: #2c3e50; }
        #mensaje { font-size: 28px; font-weight: bold; margin-top: 20px; height: 40px; }
        .game-over { color: #e74c3c; text-transform: uppercase; animation: shake 0.5s; }
        .win { color: #27ae60; text-shadow: 1px 1px 2px rgba(0,0,0,0.1); }
        
        @keyframes shake {
            0% { transform: translateX(0); }
            25% { transform: translateX(-10px); }
            50% { transform: translateX(10px); }
            100% { transform: translateX(0); }
        }
    </style>
</head>
<body>

    <h1>Examen de Programación IA - Tipo B</h1>
    <h3>Alumno: Citlally</h3>
    <p>Usa las <b>flechas del teclado</b> para mover el cubo azul hasta la zona verde.</p>
    
    <canvas id="gameCanvas" width="400" height="400"></canvas>
    <div id="mensaje"></div>

    <script>
        const canvas = document.getElementById("gameCanvas");
        const ctx = canvas.getContext("2d");
        const mensaje = document.getElementById("mensaje");

        // Configuración del jugador (Cubo Azul)
        let player = { x: 20, y: 20, size: 25, speed: 7 };
        
        // Zona de Meta (Cuadrado Verde)
        const goal = { x: 330, y: 330, size: 60 };

        // Minas (Círculos Rojos)
        const mines = [
            { x: 120, y: 80, r: 18 },
            { x: 280, y: 60, r: 18 },
            { x: 200, y: 200, r: 20 },
            { x: 80, y: 250, r: 18 },
            { x: 300, y: 280, r: 15 },
            { x: 100, y: 350, r: 15 }
        ];

        let gameActive = true;

        function draw() {
            if (!gameActive) return;

            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // 1. Dibujar Zona de Meta
            ctx.fillStyle = "#27ae60";
            ctx.fillRect(goal.x, goal.y, goal.size, goal.size);
            ctx.fillStyle = "white";
            ctx.font = "bold 14px Arial";
            ctx.fillText("META", goal.x + 10, goal.y + 35);

            // 2. Dibujar Jugador (Citlally)
            ctx.fillStyle = "#3498db";
            ctx.fillRect(player.x, player.y, player.size, player.size);

            // 3. Dibujar Minas y detectar colisión
            ctx.fillStyle = "#e74c3c";
            mines.forEach(mine => {
                ctx.beginPath();
                ctx.arc(mine.x, mine.y, mine.r, 0, Math.PI * 2);
                ctx.fill();

                // Detección de colisión simple
                if (player.x < mine.x + mine.r && player.x + player.size > mine.x - mine.r &&
                    player.y < mine.y + mine.r && player.y + player.size > mine.y - mine.r) {
                    gameOver();
                }
            });

            // 4. Detectar si llegó a la Zona de Meta
            if (player.x + player.size > goal.x && player.y + player.size > goal.y) {
                victory();
            }

            requestAnimationFrame(draw);
        }

        function movePlayer(e) {
            if (!gameActive) return;

            if (e.key === "ArrowUp" && player.y > 0) player.y -= player.speed;
            if (e.key === "ArrowDown" && player.y < canvas.height - player.size) player.y += player.speed;
            if (e.key === "ArrowLeft" && player.x > 0) player.x -= player.speed;
            if (e.key === "ArrowRight" && player.x < canvas.width - player.size) player.x += player.speed;
        }

        function gameOver() {
            gameActive = false;
            mensaje.innerHTML = "¡GAME OVER! Inténtalo de nuevo, Citlally.";
            mensaje.className = "game-over";
        }

        function victory() {
            gameActive = false;
            mensaje.innerHTML = "¡EXCELENTE, CITLALLY! Has llegado a la meta.";
            mensaje.className = "win";
        }

        window.addEventListener("keydown", movePlayer);
        draw();
    </script>
</body>
</html>
